api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy-net
    httpClientTimeout: 300

certificatesResolvers:
  myresolver:
    acme:
      email: ikadev.services@gmail.com
      storage: acme.json
      httpChallenge:
        entryPoint: web


