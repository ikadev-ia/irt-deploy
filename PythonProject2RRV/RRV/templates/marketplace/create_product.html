{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow border-0 rounded-4">

            <div class="card-body p-5">

                <h2 class="mb-4">
                    {% if edit_mode %}
                        Modifier ma pépite
                    {% else %}
                        Ajouter une pépite
                    {% endif %}
                </h2>

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    {{ form|crispy }}

                    <button class="btn btn-main w-100 mt-3">
                        {% if edit_mode %}
                            Enregistrer les modifications
                        {% else %}
                            Publier l'article
                        {% endif %}
                    {% if edit_mode %}
    Modifier ma pépite
{% else %}
    Ajouter une pépite
{% endif %} </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
