{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0" style="border-radius: 20px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4" style="color: #5D4037;">Finaliser l'achat</h3>

                    <div class="d-flex align-items-center mb-4 p-3 bg-light" style="border-radius: 15px;">
                        <img src="{{ product.image.url }}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 10px;">
                        <div class="ms-3">
                            <h6 class="mb-0">{{ product.title }}</h6>
                            <span class="fw-bold" style="color: #8D6E63;">{{ product.price }} FCFA</span>
                        </div>
                    </div>

                    <form action="{% url 'payment_success' %}" method="POST" id="payment-form">
                        {% csrf_token %}
                        <label class="form-label fw-bold">Choisir un mode de paiement :</label>

                        <div class="payment-options mb-4">
                            <!-- Orange Money -->
                            <div class="form-check p-3 border mb-2" style="border-radius: 10px; cursor: pointer;">
                                <input class="form-check-input" type="radio" name="method" id="orange" value="OM" onclick="showForm('mobile')">
                                <label class="form-check-label d-flex align-items-center" for="orange">
                                    <span class="ms-2">Orange Money</span>
                                </label>
                            </div>

                            <!-- Wave -->
                            <div class="form-check p-3 border mb-2" style="border-radius: 10px;">
                                <input class="form-check-input" type="radio" name="method" id="wave" value="W" onclick="showForm('mobile')">
                                <label class="form-check-label" for="wave">
                                    <span class="ms-2">Wave</span>
                                </label>
                            </div>

                            <!-- Carte Bancaire -->
                            <div class="form-check p-3 border mb-2" style="border-radius: 10px;">
                                <input class="form-check-input" type="radio" name="method" id="card" value="CARD" onclick="showForm('card')">
                                <label class="form-check-label" for="card">
                                    <span class="ms-2">Carte Bancaire (Visa/Mastercard)</span>
                                </label>
                            </div>
                        </div>

                        <!-- Formulaire Mobile Money (Dynamique) -->
                        <div id="mobile-form" style="display: none;" class="mb-3 animate__animated animate__fadeIn">
                            <input type="text" class="form-control mb-2" placeholder="Numéro de téléphone (ex: 70000000)" required>
                            <input type="number" class="form-control" value="{{ product.price }}" readonly>
                        </div>

                        <!-- Formulaire Carte (Dynamique) -->
                        <div id="card-form" style="display: none;" class="mb-3 animate__animated animate__fadeIn">
                            <input type="text" class="form-control mb-2" placeholder="Nom sur la carte">
                            <input type="text" class="form-control mb-2" placeholder="0000 0000 0000 0000">
                            <div class="row">
                                <div class="col-6"><input type="text" class="form-control" placeholder="MM/YY"></div>
                                <div class="col-6"><input type="text" class="form-control" placeholder="CVV"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-revina w-100 py-3 mt-3 shadow" style="border-radius: 15px;">
                            Valider le paiement
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function showForm(type) {
    document.getElementById('mobile-form').style.display = (type === 'mobile') ? 'block' : 'none';
    document.getElementById('card-form').style.display = (type === 'card') ? 'block' : 'none';
}
</script>
{% endblock %}
