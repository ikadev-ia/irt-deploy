{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm border-0 rounded-4 p-4" style="max-width: 400px; width: 100%; background-color: white;">

        <div class="text-center mb-4">
            <h2 style="font-family: 'Playfair Display', serif; color: #5D4037;">Connexion</h2>
            <p class="text-muted small">Heureux de vous revoir sur Revina</p>
        </div>

        <form method="post">
            {% csrf_token %}

            {{ form|crispy }}

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-lg" style="background-color: #2F4F4F; color: white; border-radius: 10px; font-weight: 600;">
                    Se connecter
                </button>
            </div>
        </form>

        <div class="text-center mt-3">
            <p class="small">Pas encore de compte ?
                <a href="{% url 'register' %}" style="color: #8D6E63; font-weight: bold; text-decoration: none;">S'inscrire ici</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
