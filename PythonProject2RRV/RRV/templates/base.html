{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVINA - Marketplace Vintage</title>

    <!-- Liens CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Lien CSS avec version pour forcer le rafraîchissement -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2.0">

    <style>
        .loader-img {
            width: 100%;
            max-width: 250px;
            height: 200px;
            object-fit: cover;
            object-position: top;
            border-radius: 20px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.6s ease-out;
        }
        .show-img { opacity: 1; transform: scale(1); }
    </style>
</head>

<body>

    <!-- Loader -->
    <div id="dynamic-loader-wrapper" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdfaf0; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <h1 id="welcome-text" style="font-family: 'Playfair Display', serif; font-size: 3rem; color: #5D4037; margin-bottom: 30px; transition: opacity 0.5s ease-in-out;">Bienvenue</h1>
        <div class="loader-grid-container" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; align-items: center; justify-items: center; width: 90%; max-width: 600px;">
            <img src="{% static 'images/loader_man_stylish.png' %}" class="loader-img">
            <img src="{% static 'images/loader_man_traditional.png' %}" class="loader-img">
            <div style="grid-column: span 2; margin: 20px 0;">
                <img src="{% static 'images/logo-revina.png' %}" alt="Logo" style="width: 120px; background: #fdfaf0;">
            </div>
            <img src="{% static 'images/loader_woman_boubou.png' %}" class="loader-img">
            <img src="{% static 'images/loader_woman_stylish.png' %}" class="loader-img">
        </div>
    </div>

    {% include 'partials/navbar.html' %}

    <!-- Contenu principal avec marge corrigée -->
    <main class="main-content" style="margin-top: 70px;">
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Logique de cycle de messages
        const messages = ["Bienvenue", "Welcome",];
        let msgIndex = 0;
        const textElement = document.getElementById("welcome-text");
        const intervalId = setInterval(() => {
            textElement.style.opacity = 0;
            setTimeout(() => {
                msgIndex = (msgIndex + 1) % messages.length;
                textElement.innerText = messages[msgIndex];
                textElement.style.opacity = 1;
            }, 500);
        }, 2000);

        // Logique pour afficher le loader UNE SEULE FOIS par session
        window.addEventListener("load", function() {
            const loader = document.getElementById("dynamic-loader-wrapper");

            if (sessionStorage.getItem('loaderSeen')) {
                loader.style.display = "none";
                clearInterval(intervalId);
            } else {
                sessionStorage.setItem('loaderSeen', 'true');
                const images = document.querySelectorAll('.loader-img');
                images.forEach((img, index) => {
                    setTimeout(() => { img.classList.add('show-img'); }, index * 500);
                });
                setTimeout(() => {
                    loader.style.transition = "opacity 0.8s ease";
                    loader.style.opacity = "0";
                    setTimeout(() => {
                        loader.style.display = "none";
                        clearInterval(intervalId);
                    }, 800);
                }, 3500);
            }
        });
    </script>
</body>
</html>
