{% load crispy_forms_tags %}
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Revina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="auth-card col-md-6 col-lg-5">
        <div class="text-center mb-4">
            <h1 style="font-family: 'Playfair Display'; color: #5D4037;">Revina</h1>
            <p class="text-muted">Créez votre compte pour explorer le vintage malien</p>
        </div>

        <form method="post" enctype="multipart/form-data" class="p-2">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-revina shadow-sm">S'inscrire</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <small>Déjà un compte ? <a href="{% url 'login' %}" style="color: #2F4F4F;">Connectez-vous</a></small>
        </div>
    </div>
</div>

</body>
</html>
