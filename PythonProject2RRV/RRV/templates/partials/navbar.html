{% load static %}
<nav class="navbar navbar-expand fixed-top shadow-sm bg-white border-bottom" style="height: 70px;">
    <div class="container-fluid px-2 d-flex align-items-center flex-nowrap">

        <a class="navbar-brand m-0" href="{% url 'marketplace:home' %}">
            <img src="{% static 'images/logo-revina.png' %}" alt="Revina Logo" style="height: 60px; width: auto; object-fit: contain;">
        </a>

        <div class="d-flex align-items-center ms-auto flex-nowrap gap-2">

            <a class="nav-link p-1 fw-bold" href="{% url 'shop:index' %}" style="font-size: 0.8rem; color: #5D4037; white-space: nowrap;">
                <i class="bi bi-shop"></i> Shop
            </a>

            <a href="{% url 'cart:cart_detail' %}" class="nav-link p-1 position-relative fw-bold" style="font-size: 0.8rem; color: #5D4037; white-space: nowrap;">
                <i class="fas fa-shopping-cart"></i>

                {% if cart_count and cart_count > 0 %}
                    <span id="cart-count-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.5rem;">
                        {{ cart_count }}
                    </span>
                {% else %}
                    <span id="cart-count-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.5rem; display: none;">
                        0
                    </span>
                {% endif %}
            </a>

            {% if not user.is_authenticated %}
                <a class="nav-link p-1" href="/accounts/login/" style="font-size: 0.8rem;">Connexion</a>
                <a class="btn btn-sm btn-revina px-2" href="/accounts/register/" style="font-size: 0.8rem;">Rejoindre</a>
            {% else %}
                <a href="{% url 'marketplace:create_product' %}" class="btn btn-sm btn-revina px-1 py-0" style="font-size: 0.75rem; line-height: 1.5;">Vendre</a>

                <a class="nav-link p-1" href="{% url 'messaging:inbox' %}" title="Messages">
                    <i class="bi bi-chat-dots" style="color: #5D4037;"></i>
                </a>

                <a href="{% url 'notifications:notifications_list' %}" class="position-relative nav-link p-1" title="Notifications">
                    <i class="fa fa-bell" style="color: #5D4037;"></i>
                    <span id="notification-count-badge"
                          class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle"
                          style="font-size: 0.6rem; display: {% if unread_count > 0 %}inline-block{% else %}none{% endif %};">
                        {{ unread_count|default:"0" }}
                    </span>
                </a>

                <div class="dropdown">
                    <a class="nav-link p-1 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                        <li><a class="dropdown-item" href="{% url 'marketplace:dashboard' %}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form action="/accounts/logout/" method="POST">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Se déconnecter
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            {% endif %}
        </div>
    </div>
</nav>
