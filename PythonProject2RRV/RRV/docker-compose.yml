version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=config.settings
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rrv.rule=Host(`www.shop-revina.com`) || Host(`shop-revina.com`)"
      - "traefik.http.routers.rrv.entrypoints=websecure"
      - "traefik.http.routers.rrv.tls.certresolver=myresolver"
      - "traefik.http.services.rrv.loadbalancer.server.port=8000"
    # Si vous utilisez une base de données PostgreSQL plus tard :
    # depends_on:
    #   - db

#  db:
#    image: postgres:15
#    volumes:
#      - postgres_data:/var/lib/postgresql/data/
#    environment:
#      - POSTGRES_DB=django_db
#      - POSTGRES_USER=django_user
#      - POSTGRES_PASSWORD=django_password

# volumes:
#   postgres_data:

networks:
  proxy-net:
    external: true
