<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>QR Code - Poulplume</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .qr-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            max-width: 450px;
            width: 100%;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #14B53A, #0d8a2f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .logo i {
            font-size: 2.5rem;
            color: #FCD116;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .poul {
            color: #FCD116;
        }
        .plume {
            color: #14B53A;
        }
        .subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        #qrcode img {
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .url-info {
            background: #f8fafc;
            padding: 12px;
            border-radius: 24px;
            font-size: 12px;
            color: #14B53A;
            word-break: break-all;
            margin: 15px 0;
            font-family: monospace;
            font-weight: 500;
        }
        .btn-copy {
            background: #14B53A;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-copy:hover {
            background: #0d8a2f;
            transform: scale(1.02);
        }
        .note {
            font-size: 11px;
            color: #999;
            margin-top: 20px;
        }
        @media (max-width: 480px) {
            .qr-container {
                padding: 25px;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="qr-container">
    <div class="logo">
        <i class="fas fa-chicken"></i>
    </div>
    <h1>
        <span class="poul">Poul</span><span class="plume">plume</span>
    </h1>
    <div class="subtitle">Scannez pour accéder à l'application</div>

    <div id="qrcode"></div>

    <div class="url-info" id="urlDisplay">
        <i class="fas fa-link"></i> https://soutenancefdk.netlify.app/
    </div>

    <button class="btn-copy" onclick="copyUrl()">
        <i class="fas fa-copy"></i> Copier le lien
    </button>

    <div class="note">
        📱 Scannez avec votre téléphone → Accès direct à Poulplume
    </div>
</div>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
    // URL de votre site
    const appUrl = 'https://soutenancefdk.netlify.app/';
    
    // Générer le QR code
    new QRCode(document.getElementById("qrcode"), {
        text: appUrl,
        width: 220,
        height: 220,
        colorDark: "#14B53A",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
    
    // Fonction pour copier l'URL
    function copyUrl() {
        navigator.clipboard.writeText(appUrl).then(() => {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copié !';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        });
    }
</script>
</body>
</html>
