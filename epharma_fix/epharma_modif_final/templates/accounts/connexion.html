{% extends 'base.html' %}
{% block title %}Connexion — E-Pharma{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 rounded-4 p-4 p-md-5" style="box-shadow:0 4px 24px rgba(0,0,0,.10)">
        <div class="text-center mb-4">
          <div style="font-size:3rem">🔐</div>
          <h3 class="fw-800">Bon retour !</h3>
          <p class="text-muted">Connectez-vous à votre compte E-Pharma</p>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="fw-700 mb-1">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" placeholder="Votre identifiant" autofocus />
          </div>
          <div class="mb-3">
            <label class="fw-700 mb-1">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" />
          </div>
          {% if form.errors %}
          <div class="alert alert-danger small">Identifiants incorrects. Réessayez.</div>
          {% endif %}
          <button type="submit" class="btn btn-vert w-100 py-3 fw-800 mt-2" style="font-size:1rem; border-radius:12px">
            <i class="fa fa-sign-in-alt me-2"></i>Se connecter
          </button>
        </form>
        <p class="text-center mt-4 text-muted">Pas encore de compte ? <a href="{% url 'inscription' %}" class="text-success fw-700">Créer un compte</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
