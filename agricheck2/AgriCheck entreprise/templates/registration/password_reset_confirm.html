{% load static %}
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nouveau mot de passe - Agricheck Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body class="auth-simple">
<main class="auth-card">
    <img src="{% static 'img/agricheck-logo.png' %}" alt="Agri Check">
    <h1>Nouveau mot de passe</h1>
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-agricheck w-100" type="submit">Mettre a jour</button>
        </form>
    {% else %}
        <p>Ce lien n'est plus valide.</p>
        <a class="btn btn-agricheck w-100" href="{% url 'password_reset' %}">Demander un nouveau lien</a>
    {% endif %}
</main>
</body>
</html>
