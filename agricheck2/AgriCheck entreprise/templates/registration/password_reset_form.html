{% load static %}
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mot de passe oublie - Agricheck Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body class="auth-simple">
<main class="auth-card">
    <img src="{% static 'img/agricheck-logo.png' %}" alt="Agri Check">
    <h1>Mot de passe oublie</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}
        <button class="btn btn-agricheck w-100 mt-3" type="submit">Envoyer le lien</button>
    </form>
    <a href="{% url 'login' %}">Retour a la connexion</a>
</main>
</body>
</html>
