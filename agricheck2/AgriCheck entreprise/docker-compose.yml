services:
  mysql:
    image: mysql:8.4
    container_name: agricheck-entreprise-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: agricheck_entreprise
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - agricheck_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  agricheck_mysql_data:
