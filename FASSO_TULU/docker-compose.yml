version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fassotulu.rule=Host(`www.faso-tulu.com`) || Host(`faso-tulu.com`)"
      - "traefik.http.routers.fassotulu.entrypoints=websecure"
      - "traefik.http.routers.fassotulu.tls.certresolver=myresolver"
      - "traefik.http.services.fassotulu.loadbalancer.server.port=80"
    restart: always

networks:
  proxy-net:
    external: true
